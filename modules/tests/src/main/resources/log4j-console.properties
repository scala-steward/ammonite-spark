# Same as log4j.properties, but also logs to the console at INFO level.
# Selected by Init.setupLog4j() when SPARK_LOG_CONSOLE is set, to help
# debugging the tests (in particular the YARN ones).

log4j.rootLogger=INFO, default.file, console

log4j.appender.default.file=org.apache.log4j.RollingFileAppender
log4j.appender.default.file.append=true
log4j.appender.default.file.file=spark.log
log4j.appender.default.file.threshold=INFO
log4j.appender.default.file.layout=org.apache.log4j.PatternLayout
log4j.appender.default.file.layout.ConversionPattern=%-5p %c: %m%n
log4j.appender.default.file.MaxFileSize=1MB
log4j.appender.default.file.MaxBackupIndex=5

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.threshold=INFO
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%-5p %c: %m%n
