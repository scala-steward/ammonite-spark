name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        MASTER: ["local", "standalone", "yarn", "local-distrib", "yarn-distrib"]
    steps:
    - name: Don't convert LF to CRLF during checkout
      if: runner.os == 'Windows'
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v8.1
      with:
        extraFiles: "[\".github/scripts/*\", \".github/workflows/ci.yml\", \"*.sh\"]"
        extraKey: test-${{ matrix.MASTER }}
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 8
    - run: .github/scripts/test.sh
      shell: bash
      env:
        MASTER: ${{ matrix.MASTER }}

  # job whose name doesn't change when we bump Scala versions, add OSes, …
  # We require this job for auto-merge.
  all-tests:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - run: true
      shell: bash

  checks:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: "temurin:17"
        apps: scalafmt:3.0.0
    - name: Empty sources, orphan sources, missing test classes checks
      run: ./mill -i --import io.github.alexarchambault.mill::mill-checks:0.1.2 io.github.alexarchambault.millchecks.MillChecks/allChecks
      env:
        MILL_CHECKS_ALLOW_EMPTY_SOURCES: >-
          local-spark-distrib-tests,
          standalone-tests,
          yarn-spark-distrib-tests,
          yarn-tests.2_12_11,
          yarn-tests.2_13_11
        MILL_CHECKS_ORPHAN_SOURCES_IGNORE: >-
          mill-build
    - name: Ensure computing non-final sources doesn't trigger compilation
      run: ./mill --import io.github.alexarchambault.mill::mill-checks:0.1.2 io.github.alexarchambault.millchecks.MillChecks/bspChecks

  format:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: "temurin:17"
        apps: scalafmt:3.0.0
    - run: scalafmt --check
